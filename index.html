<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Tube</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <header>
        <nav class="w-11/12 mx-auto flex justify-between border-b-1 mt-2 rounded-lg py-3 border-[#17171733]">
            <div class="log">
                <img class="w-[120px] " src="assets/Logo.png" alt="">
            </div>
            <div class="sort">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></g></svg>
                    <input id="search-input"
                     type="search" required placeholder="Search"/>
                  </label>
            </div>
            <div class="blogs">
                <button class="btn bg-[#FF1F3D] text-white">Sort by View</button>
            </div>
        </nav>
    </header>
<!-- Btns -->
<nav id="categaroy-container" class="flex py-4 justify-center 
          gap-5">
   <div>
    <button id="btn-all" onclick="loadVideos()" class="btn btn-sm  ">All</button>
   </div>
   

</nav>


<section id="video-contaoner" class="w-11/12 mx-auto grid 
grid-cols-4 gap-2">


<div class="col-span-full flex flex-col justify-center items-center mt-16">
    <img class="w-[220px]" src="assets/Icon.png" alt="">
    <h2 class="text-2xl pt-5 font-bold text-center">
        Oops!! Sorry, There is no <br>
                content here
    </h2>
</div>


</section>

<!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<dialog id="video_details" class="modal">
  <div class="modal-box">

    <div id="details-container">

    </div>

    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>



    <script src="scrips/index.js"></script>
</body>
</html>
